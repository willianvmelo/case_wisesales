name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend - Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lint (ruff)
        working-directory: backend
        run: |
          ruff check .

      - name: Run tests
        working-directory: backend
        run: |
          pytest

  frontend:
    name: Frontend - Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: |
          npm install

      - name: Run lint
        working-directory: frontend
        run: |
          npm run lint

      - name: Run tests
        working-directory: frontend
        run: |
          npm run test