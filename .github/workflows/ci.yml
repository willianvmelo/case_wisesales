name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend - Lint & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: wisesales
          POSTGRES_USER: wisesales
          POSTGRES_PASSWORD: wisesales123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wisesales -d wisesales"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_NAME: Wise Sales API
      APP_ENV: test
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: wisesales
      DB_USER: wisesales
      DB_PASSWORD: wisesales123
      CORS_ORIGINS: '["http://localhost:5173", "http://localhost:3000"]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          python - <<'PY'
          import socket
          import time

          host = "127.0.0.1"
          port = 5432

          for _ in range(30):
              try:
                  with socket.create_connection((host, port), timeout=2):
                      print("Postgres is ready")
                      break
              except OSError:
                  time.sleep(2)
          else:
              raise SystemExit("Postgres did not become ready in time")
          PY

      - name: Seed database
        run: |
          PGPASSWORD=$DB_PASSWORD psql -h $DB_HOST -U $DB_USER -d $DB_NAME -f seed.sql

      - name: Run migrations
        working-directory: backend
        run: |
          alembic upgrade head

      - name: Run lint (ruff)
        working-directory: backend
        run: |
          ruff check .

      - name: Run tests
        working-directory: backend
        run: |
          pytest

  frontend:
    name: Frontend - Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: |
          npm install

      - name: Run lint
        working-directory: frontend
        run: |
          npm run lint

      - name: Run tests
        working-directory: frontend
        run: |
          npm run test